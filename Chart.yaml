apiVersion: v2
appVersion: '1.12.2'
description: the Lago open source billing app
name: lago
version: 1.12.2
dependencies:
  - condition: postgresql.enabled
    name: postgresql
    version: '13.2.2'
  - condition: redis.enabled
    name: redis
    repository: https://charts.bitnami.com/bitnami
    version: '18.2.1'
    repository: https://charts.bitnami.com/bitnami
  - condition: minio.enabled
    name: minio
    version: '5.2.0'
    repository: https://charts.min.io/
